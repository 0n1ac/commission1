<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밥친구</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/pages.css">
  </head>
  <body>
    <div class="splash" data-splash>
      <div class="splash__mark">밥</div>
      <p>밥친구</p>
    </div>
    <div id="app" class="app-shell">
      <main class="app-main" aria-live="polite">
        <section id="view-home" class="view" data-route="home" aria-labelledby="title-home">
          <div class="home-page" data-home-page>
            <h1 id="title-home" class="view__title">홈</h1>
            <p class="home-loading">홈 화면을 불러오는 중입니다.</p>
          </div>
        </section>
        <section id="view-map" class="view" data-route="map" aria-labelledby="title-map">
          <div class="map-page" data-map-page>
            <h1 id="title-map" class="view__title">지도</h1>
            <p class="home-loading">지도 화면을 불러오는 중입니다.</p>
          </div>
        </section>
        <section id="view-board" class="view" data-route="board" aria-labelledby="title-board">
          <div class="board-page" data-board-page>
            <h1 id="title-board" class="view__title">게시판</h1>
            <p class="home-loading">게시판을 불러오는 중입니다.</p>
          </div>
        </section>
        <section id="view-chat" class="view" data-route="chat" aria-labelledby="title-chat">
          <div class="chat-page" data-chat-page>
            <h1 id="title-chat" class="view__title">채팅</h1>
            <p class="home-loading">채팅을 불러오는 중입니다.</p>
          </div>
        </section>
        <section id="view-mypage" class="view" data-route="mypage" aria-labelledby="title-mypage">
          <div class="mypage" data-mypage>
            <h1 id="title-mypage" class="view__title">마이</h1>
            <p class="home-loading">마이페이지를 불러오는 중입니다.</p>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="주요 메뉴">
        <a class="bottom-nav__item" href="#home" data-nav-route="home" aria-label="홈">
          <span class="bottom-nav__icon" aria-hidden="true">🏠</span>
          <span class="bottom-nav__label">홈</span>
        </a>
        <a class="bottom-nav__item" href="#map" data-nav-route="map" aria-label="지도">
          <span class="bottom-nav__icon" aria-hidden="true">🗺</span>
          <span class="bottom-nav__label">지도</span>
        </a>
        <a class="bottom-nav__item" href="#board" data-nav-route="board" aria-label="게시판">
          <span class="bottom-nav__icon" aria-hidden="true">📋</span>
          <span class="bottom-nav__label">게시판</span>
        </a>
        <a class="bottom-nav__item" href="#chat" data-nav-route="chat" aria-label="채팅">
          <span class="bottom-nav__icon" aria-hidden="true">💬</span>
          <span class="bottom-nav__label">채팅</span>
        </a>
        <a class="bottom-nav__item" href="#mypage" data-nav-route="mypage" aria-label="마이">
          <span class="bottom-nav__icon" aria-hidden="true">👤</span>
          <span class="bottom-nav__label">마이</span>
        </a>
      </nav>
    </div>

    <script src="./js/router.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
